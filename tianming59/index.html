<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>天命五九 · 倪海厦</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="toc-wrapper">
  <div class="toc-header">
    <div class="book-icon"><span class="chinese-ornament">◈</span></div>
    <h1>天命五九</h1>
    <div class="subtitle">渡人渡己 · 杏林春暖</div>
    <div class="subtitle-en">The Fifty-Ninth Year of Destiny</div>
    <div class="divider"><span class="divider-text">盘丝墨痕</span></div>
    <div class="book-stats">
      <span>📖 <span class="stat-num">18</span> 章</span>
      <span>✍️ <span class="stat-num">盘丝墨痕</span> 著</span>
    </div>
  </div>

  <ul class="chapter-list" id="chapter-list">
  </ul>
</div>

<footer class="site-footer"><span class="author">盘丝墨痕</span> · 天命五九 · 2026</footer>

<script>
var chapters = [
  ["第一章", "醒来", "chapter-1.html"],
  ["第二章", "入村", "chapter-2.html"],
  ["第三章", "第一根针", "chapter-3.html"],
  ["第四章", "残手", "chapter-4.html"],
  ["第五章", "收敛", "chapter-5.html"],
  ["第六章", "消息", "chapter-6.html"],
  ["第七章", "兑", "chapter-7.html"],
  ["第八章", "行路", "chapter-8.html"],
  ["第九章", "晨药", "chapter-9.html"],
  ["第十章", "县医院", "chapter-10.html"],
  ["第十一章", "回访", "chapter-11.html"],
  ["第十二章", "生根", "chapter-12.html"],
  ["第十三章", "夜路", "chapter-13.html"],
  ["第十四章", "远地", "chapter-14.html"],
  ["第十五章", "井", "chapter-15.html"],
  ["第十六章", "再拣", "chapter-16.html"],
  ["第十七章", "言语", "chapter-17.html"],
  ["第十八章", "错药", "chapter-18.html"]
];

var list = document.getElementById('chapter-list');
chapters.forEach(function(ch) {
  var label = ch[0], title = ch[1], file = ch[2];
  var li = document.createElement('li');
  li.style.listStyle = 'none';
  li.innerHTML = '<a href="' + file + '" class="chapter-item">' +
    '<span class="ch-number">' + label + '</span>' +
    '<span class="ch-title">' + title + '</span>' +
    '<span class="ch-arrow">→</span></a>';
  list.appendChild(li);
});
</script>

</body>
</html>
