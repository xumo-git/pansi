<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>驯蕊 · 盘丝墨痕</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.gate-wrapper {
  max-width: 480px;
  margin: 0 auto;
  padding: 80px 20px;
  text-align: center;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.gate-lock {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.gate-title {
  font-family: var(--font-serif);
  font-size: 32px;
  color: var(--red);
  letter-spacing: 6px;
  margin-bottom: 8px;
}
.gate-desc {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-bottom: 32px;
}
.gate-input {
  width: 260px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  text-align: center;
  outline: none;
  transition: border 0.3s;
}
.gate-input:focus {
  border-color: var(--red-dim);
}
.gate-btn {
  display: block;
  margin: 12px auto;
  padding: 10px 32px;
  background: transparent;
  border: 1px solid var(--red-dim);
  border-radius: var(--radius-sm);
  color: var(--red);
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
}
.gate-btn:hover {
  background: var(--red-dim);
  color: var(--text);
}
.gate-error {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--red-light);
  margin-top: 8px;
  min-height: 20px;
  opacity: 0;
  transition: opacity 0.3s;
}
.gate-error.show { opacity: 1; }
.gate-apply {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 24px;
  text-decoration: underline;
  cursor: pointer;
  transition: color 0.2s;
}
.gate-apply:hover { color: var(--gold); }

/* ── 申请表单弹窗 ── */
.apply-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.apply-overlay.open { display: flex; }
.apply-modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 32px 32px;
  max-width: 420px;
  width: 100%;
  position: relative;
  text-align: left;
}
.apply-modal h2 {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 4px;
}
.apply-modal .sub {
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  letter-spacing: 1px;
  margin-bottom: 24px;
}
.apply-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
}
.apply-close:hover { color: var(--text); }
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  outline: none;
  transition: border 0.3s;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--gold-dim);
}
.form-group textarea {
  min-height: 80px;
  resize: vertical;
}
.submit-btn {
  width: 100%;
  padding: 12px;
  background: var(--red-dim);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: background 0.3s;
}
.submit-btn:hover { background: var(--red); }
.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.form-success {
  display: none;
  text-align: center;
  padding: 24px 0;
}
.form-success .icon { font-size: 40px; margin-bottom: 12px; }
.form-success h3 {
  font-family: var(--font-serif);
  color: var(--gold);
  margin-bottom: 8px;
}
.form-success p {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.8;
}
/* ── 目录内容（解锁后） ── */
.toc-wrapper {
  display: none; /* initially hidden */
  max-width: 600px;
  margin: 0 auto;
  padding: 60px 20px;
}
.toc-wrapper.unlocked { display: block; }
.toc-header { text-align: center; margin-bottom: 40px; }
.toc-header .book-icon {
  font-size: 36px; margin-bottom: 8px;
}
.toc-header h1 {
  font-family: var(--font-serif);
  font-size: 34px;
  color: var(--red);
  letter-spacing: 6px;
  margin-bottom: 4px;
}
.toc-header .subtitle {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 3px;
}
.toc-header .subtitle-en {
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--gold-dim);
  letter-spacing: 2px;
  margin-top: 2px;
  opacity: 0.6;
}
.divider {
  margin: 16px 0;
  color: var(--red-dim);
  letter-spacing: 4px;
}
.chapter-list { display: flex; flex-direction: column; gap: 0; }
.chapter-item {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  text-decoration: none;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  transition: all 0.2s;
}
.chapter-item:hover {
  background: var(--bg-elevated);
  color: var(--text);
}
.chapter-item .ch-number {
  min-width: 60px;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 1px;
}
.chapter-item .ch-title { flex: 1; font-size: 16px; }
.chapter-item .ch-arrow { color: var(--text-muted); font-size: 14px; }

/* ── 管理员面板 ── */
.admin-panel {
  display: none;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
}
.admin-panel.open { display: block; }
.admin-panel h3 {
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.admin-app {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 8px;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}
.admin-app strong { color: var(--text); }
.admin-badge {
  font-family: var(--font-sans);
  font-size: 10px;
  color: var(--red-dim);
  cursor: pointer;
  letter-spacing: 1px;
  transition: color 0.2s;
}
.admin-badge:hover { color: var(--red); }
</style>
</head>
<body>

<div id="gate" class="gate-wrapper">
  <div class="gate-lock">🔒</div>
  <div class="gate-title">驯 蕊</div>
  <div class="gate-desc">本文需申请阅读权限</div>

  <input id="pw-input" class="gate-input" type="password" placeholder="输入密码解锁" autocomplete="off">
  <button class="gate-btn" onclick="unlock()">解 锁</button>
  <div id="gate-error" class="gate-error">密码错误，请重试或申请阅读</div>
  <div class="gate-apply" onclick="openApply()">没有密码？申请阅读 →</div>
</div>

<!-- 申请弹窗 -->
<div id="apply-overlay" class="apply-overlay">
  <div class="apply-modal">
    <button class="apply-close" onclick="closeApply()">✕</button>
    <h2>申请阅读</h2>
    <div class="sub">填写信息后等待审核</div>

    <div id="apply-form">
      <div class="form-group">
        <label>称呼 *</label>
        <input id="field-name" type="text" placeholder="如何称呼你">
      </div>
      <div class="form-group">
        <label>邮箱 *</label>
        <input id="field-email" type="email" placeholder="用于接收审核结果">
      </div>
      <div class="form-group">
        <label>申请理由</label>
        <textarea id="field-reason" placeholder="简单说说为什么想看这篇作品（选填）"></textarea>
      </div>
      <button class="submit-btn" onclick="submitApply()">提交申请</button>
    </div>

    <div id="form-success" class="form-success">
      <div class="icon">📨</div>
      <h3>申请已提交</h3>
      <p>审核通过后你会收到通知。<br>感谢你的关注。</p>
    </div>
  </div>
</div>

<!-- 目录（解锁后显示） -->
<div id="toc" class="toc-wrapper">
  <div class="toc-header">
    <div class="book-icon">◈</div>
    <h1>驯蕊</h1>
    <div class="subtitle">三书救赎 · 心理救赎篇</div>
    <div class="subtitle-en">Taming the Heart</div>
    <div class="divider">— — —</div>
  </div>

  <div class="chapter-list" id="chapter-list"></div>

  <p style="text-align:center;margin-top:32px;font-family:var(--font-sans);font-size:11px;color:var(--text-muted);">
    <a href="javascript:lock()" style="color:var(--text-muted);text-decoration:underline;">锁定</a>
    <span style="margin:0 8px;opacity:0.3;">·</span>
    <span class="admin-badge" onclick="toggleAdmin()">申请记录</span>
  </p>

  <div id="admin-panel" class="admin-panel">
    <h3>◈ 申请记录</h3>
    <div id="admin-list"></div>
  </div>
</div>

<footer class="site-footer" style="display:none;" id="footer"><span class="author">盘丝墨痕</span> · 驯蕊</footer>

<script>
// ═══════════════════════════════════════════════
// 配置区 — 按需修改
// ═══════════════════════════════════════════════
var CONFIG = {
  // 阅读密码（可自行修改）
  password: 'xunrui2026',
  // 申请表单提交地址 — 提交内容将转发到你的邮箱
  // 默认使用 formsubmit.co（免费，无需注册）
  // 也可替换为 Formspree: https://formspree.io
  formEndpoint: 'https://formsubmit.co/ajax/874150950@qq.com'
};
// ═══════════════════════════════════════════════

var CHAPTERS = [
  ["序章", "不请自来", "chapter-0.html"],
  ["第01章", "交出去", "chapter-1.html"],
  ["第02章", "嘴巴", "chapter-2.html"],
  ["第03章", "蜡", "chapter-3.html"],
  ["第04章", "绳子", "chapter-4.html"],
  ["第05章", "训", "chapter-5.html"],
  ["第06章", "满", "chapter-6.html"],
  ["第07章", "融", "chapter-7.html"],
  ["第08章", "循", "chapter-8.html"],
  ["第09章", "涨", "chapter-9.html"],
  ["第10章", "惯", "chapter-10.html"],
  ["第11章", "悬", "chapter-11.html"],
  ["第12章", "撤", "chapter-12.html"],
  ["第13章", "敞", "chapter-13.html"],
  ["第14章", "解", "chapter-14.html"],
  ["第15章", "隙", "chapter-15.html"],
  ["第16章", "痕", "chapter-16.html"],
  ["第17章", "静", "chapter-17.html"],
  ["第18章", "邻", "chapter-18.html"],
  ["第19章", "页码", "chapter-19.html"],
  ["第20章", "核对", "chapter-20.html"],
  ["第21章", "周日", "chapter-21.html"],
  ["第22章", "散步", "chapter-22.html"],
  ["第23章", "夜祷", "chapter-23.html"],
  ["第24章", "搜索", "chapter-24.html"],
  ["第25章", "心不在焉", "chapter-25.html"],
  ["第26章", "夜巡", "chapter-26.html"],
  ["第27章", "锁门", "chapter-27.html"],
  ["第28章", "气味", "chapter-28.html"],
  ["第29章", "暗涌", "chapter-29.html"],
  ["第30章", "你最近在看什么书", "chapter-30.html"],
  ["第31章", "静物", "chapter-31.html"],
  ["第32章", "棉布", "chapter-32.html"],
  ["第33章", "未名", "chapter-33.html"],
  ["第34章", "三样", "chapter-34.html"],
  ["第35章", "等", "chapter-35.html"],
  ["第36章", "前夜", "chapter-36.html"],
  ["第37章", "人", "chapter-37.html"],
  ["第38章", "带", "chapter-38.html"],
  ["第39章", "问", "chapter-39.html"],
  ["第40章", "反刍", "chapter-40.html"],
  ["第41章", "见", "chapter-41.html"],
  ["第42章", "桌", "chapter-42.html"],
  ["第43章", "观众", "chapter-43.html"],
  ["第44章", "书", "chapter-44.html"],
  ["第45章", "汤", "chapter-45.html"],
  ["第46章", "参数", "chapter-46.html"],
  ["第47章", "位", "chapter-47.html"],
  ["第48章", "居", "chapter-48.html"],
  ["第49章", "纸", "chapter-49.html"],
  ["第50章", "传", "chapter-50.html"],
  ["第51章", "冬泳", "chapter-51.html"],
  ["第52章", "备忘录", "chapter-52.html"],
  ["第53章", "侧间", "chapter-53.html"],
  ["第54章", "钩子", "chapter-54.html"],
  ["第55章", "面馆", "chapter-55.html"],
  ["第56章", "静", "chapter-56.html"]
];

// ── 初始化 ──
(function() {
  if (localStorage.getItem('xunxui_unlocked') === 'true') {
    showContent();
  }
})();

// ── 密码解锁 ──
function unlock() {
  var input = document.getElementById('pw-input');
  var err = document.getElementById('gate-error');
  if (input.value.trim() === CONFIG.password) {
    localStorage.setItem('xunxui_unlocked', 'true');
    showContent();
  } else {
    err.classList.add('show');
    input.value = '';
    input.focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});

// ── 锁定 ──
function lock() {
  localStorage.removeItem('xunxui_unlocked');
  document.getElementById('toc').classList.remove('unlocked');
  document.getElementById('toc').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('gate-error').classList.remove('show');
}

// ── 显示目录 ──
function showContent() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('toc').style.display = 'block';
  document.getElementById('toc').classList.add('unlocked');
  document.getElementById('footer').style.display = 'block';
  renderChapters();
}

function renderChapters() {
  var list = document.getElementById('chapter-list');
  if (list.children.length > 0) return;
  CHAPTERS.forEach(function(ch) {
    var label = ch[0], title = ch[1], file = ch[2];
    var li = document.createElement('li');
    li.style.listStyle = 'none';
    li.innerHTML = '<a href="' + file + '" class="chapter-item">' +
      '<span class="ch-number">' + label + '</span>' +
      '<span class="ch-title">' + title + '</span>' +
      '<span class="ch-arrow">→</span></a>';
    list.appendChild(li);
  });
}

// ── 申请弹窗 ──
function openApply() {
  document.getElementById('apply-overlay').classList.add('open');
  document.getElementById('apply-form').style.display = 'block';
  document.getElementById('form-success').style.display = 'none';
}
function closeApply() {
  document.getElementById('apply-overlay').classList.remove('open');
}

// ── 管理员面板 ──
function toggleAdmin() {
  var panel = document.getElementById('admin-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderAdmin();
}

function renderAdmin() {
  var list = document.getElementById('admin-list');
  var apps = JSON.parse(localStorage.getItem('xunxui_apps') || '[]');
  if (apps.length === 0) {
    list.innerHTML = '<div class="admin-app" style="text-align:center;color:var(--text-muted);">暂无申请记录</div>';
    return;
  }
  list.innerHTML = apps.slice().reverse().map(function(a) {
    return '<div class="admin-app">' +
      '<strong>' + escHtml(a.name) + '</strong> · ' + escHtml(a.email) + '<br>' +
      '理由：' + escHtml(a.reason) + '<br>' +
      '<span style="color:var(--text-muted);font-size:11px;">' + escHtml(a.time) + '</span>' +
      '</div>';
  }).join('');
}

function escHtml(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

// ── 提交申请 ──
function submitApply() {
  var name = document.getElementById('field-name').value.trim();
  var email = document.getElementById('field-email').value.trim();
  var reason = document.getElementById('field-reason').value.trim();

  if (!name) { alert('请输入称呼'); return; }
  if (!email) { alert('请输入邮箱'); return; }
  if (email.indexOf('@') < 0) { alert('邮箱格式不正确'); return; }

  document.querySelector('.submit-btn').disabled = true;
  document.querySelector('.submit-btn').textContent = '提交中...';

  var data = {
    name: name,
    email: email,
    reason: reason || '（未填写）',
    time: new Date().toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'}),
    page: '驯蕊'
  };

  // 保存到本地（管理员可通过浏览器控制台查看）
  saveApplication(data);

  if (CONFIG.formEndpoint) {
    fetch(CONFIG.formEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(function(r) {
      if (r.ok) showApplySuccess();
      else showApplySuccess();
    }).catch(function() {
      showApplySuccess();
    });
  } else {
    // 无 endpoint 时延迟显示成功
    setTimeout(showApplySuccess, 800);
  }
}

function saveApplication(data) {
  var apps = JSON.parse(localStorage.getItem('xunxui_apps') || '[]');
  apps.push(data);
  localStorage.setItem('xunxui_apps', JSON.stringify(apps));
}

function showApplySuccess() {
  document.getElementById('apply-form').style.display = 'none';
  document.getElementById('form-success').style.display = 'block';
  document.querySelector('.submit-btn').disabled = false;
  document.querySelector('.submit-btn').textContent = '提交申请';
  document.getElementById('field-name').value = '';
  document.getElementById('field-email').value = '';
  document.getElementById('field-reason').value = '';
}

// ── 点击遮罩关闭 ──
document.getElementById('apply-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeApply();
});
</script>

</body>
</html>
